# engy sn53 light validator — production compose
#
# Watchtower auto-updates the image from GHCR: cut a `v*` tag in the repo and
# CI publishes ghcr.io/hanlinai/engy:latest, which watchtower pulls within the
# poll interval and recreates the validator container. Submission state lives
# in a named volume, so a restart resumes the resubmit schedule instead of
# starting the epoch over.
#
# Setup:
#   1. cp .env.validator.example .env.validator  and fill it in
#   2. docker compose --env-file .env.validator -f docker/docker-compose.validator.yml up -d
#   3. docker compose -f docker/docker-compose.validator.yml logs -f validator

services:
  validator:
    image: ghcr.io/hanlinai/engy:latest
    container_name: engy_sn53_validator
    restart: unless-stopped
    # host networking so the chain (subtensor) and the engy provider API are reachable
    network_mode: host
    env_file:
      - ../.env.validator
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
      - engy_sn53_data:/var/lib/engy-sn53
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    # pinned: an auto-updating updater is a second, unreviewed upgrade path
    image: containrrr/watchtower:1.7.1
    container_name: engy_sn53_watchtower
    restart: unless-stopped
    environment:
      # Docker 25+ refuses API versions below 1.40, and watchtower 1.7.1 —
      # the newest release; upstream has been dormant since 2023-11 — speaks
      # 1.25 and crash-loops on `client version 1.25 is too old`. Forcing the
      # negotiated version is the whole fix. Without it auto-updates silently
      # do not happen, which is how a validator stays on a broken image.
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LABEL_ENABLE=true       # only touch containers we labelled
      - WATCHTOWER_POLL_INTERVAL=300       # check GHCR every 5 min
      - WATCHTOWER_CLEANUP=true            # prune the superseded image
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  engy_sn53_data:
