# Build and push the sn53 light-validator image to GHCR.
#
# Tags:
#   - push a `v*` tag      → :latest, :<git-tag>, :sha-<commit>   (production)
#   - push to main (paths) → :staging, :sha-<commit>             (pre-release soak)
#
# Watchtower on validator machines auto-pulls the tag its compose tracks
# (:latest for production, :staging for staging).
#
# Cut a production release:
#   git tag v0.1.0 && git push origin v0.1.0

name: Build Validator Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "engy_sn53/**"
      - "docker/**"
      - "pyproject.toml"
      - "VERSION"
      - ".github/workflows/build-validator.yml"
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hanlinai/engy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ startsWith(github.ref, 'refs/tags/') && 'latest' || 'staging' }}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.validator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
